services:
  api:
    build: .
    container_name: fastapi_api
    command: ./uvicorn.sh
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - mongodb
    #environment:
      # Use o nome dos serviços como hostnames
      #DATABASE_URL: ${DATABASE_URL}
      #MONGO_URL: ${MONGO_URL}

  postgres:
      image: postgres:latest
      container_name: postgres
      environment:
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_DB=${POSTGRES_DB}
      ports:
        - "5432:5432"
      volumes:
        - C:\data-docker\postgreSQL:/var/lib/postgresql/data
  
  mongodb:
    image: mongo:latest
    container_name: mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - C:\data-docker\mongoDB:/data/db
      